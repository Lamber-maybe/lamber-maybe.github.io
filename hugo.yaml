# Hugo configuration file
title: Lamber's Blog

enableGitInfo: true
enableRobotsTXT: true

services:
  googleAnalytics:
    ID: G-BQ4Z5P97RF

defaultContentLanguage: zh-CN
languages:
  en:
    languageName: English
    weight: 1
    title: Lamber
    params:
      description: "HackTheBox writeups & Active Directory / Windows pentesting notes — Kerberoast, DCSync, ADCS ESC1/ESC7, ASREPRoast, Shadow Credentials, RID Cycling. Real thinking over copy-paste."
  zh-cn:
    languageName: 简体中文
    languageCode: zh-CN
    weight: 4
    title: Lamber

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    - identifier: hackthebox
      name: HackTheBox
      pageRef: /hackthebox
      weight: 1
      params:
        type: docs
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 2
    - identifier: about
      name: About
      pageRef: /about
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/Lamber-maybe/lamber-maybe.github.io"
      params:
        icon: github
    - name: 赞助一杯奶茶~
      weight: 6
      url: "https://afdian.com/a/Lamber-maybe"
      params:
        icon: afdian
    - name: Buy me a Coffee~
      weight: 7
      url: "https://ko-fi.com/lamber_maybe"
      params:
        icon: kofi_symbol

params:
  # Site-wide SEO metadata (consumed by Hextra's opengraph/description partials
  # and the local custom/head-end.html JSON-LD). Home pages override description
  # via their own front matter; this is the fallback for every other page.
  description: "记录 HackTheBox 靶机的完整通关思路与渗透学习笔记，专注 Windows 活动目录（AD）渗透：Kerberoast、DCSync、ADCS ESC1/ESC7、ASREPRoast、影子凭据、RID Cycling。放弃无意义的复制粘贴，沉淀属于自己的思考。"
  author: Lamber
  images:
    - /images/og-home.png
  social:
    # `twitter` is consumed by the theme's twitter_cards partial as a handle
    # (it prepends "@"), so store the bare username, not a URL.
    twitter: "Lamber28793923"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /images/xiaolin.jpg
      # width: 40
      # height: 20
      # link: /
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    displayCopyright: false
    displayPoweredBy: true

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "2006年1月2日"

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: wide
    # tabs:
    #   sync: true

  comments:
    enable: true
    type: giscus

    giscus:
      repo: "Lamber-maybe/lamber-maybe.github.io"
      repoId: "R_kgDOPhm0mw"
      category: "Announcements"
      categoryId: "DIC_kwDOPhm0m84CxAWC"
      lang: "zh-CN"